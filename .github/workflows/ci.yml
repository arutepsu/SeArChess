name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Scala / sbt)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Cache sbt / Coursier
        uses: actions/cache@v4
        with:
          path: |
            ~/.sbt
            ~/.ivy2/cache
            ~/.cache/coursier
          key: ${{ runner.os }}-sbt-${{ hashFiles('build.sbt', 'project/plugins.sbt', 'project/build.properties') }}
          restore-keys: |
            ${{ runner.os }}-sbt-

      - name: Test with aggregated coverage
        if: github.event_name != 'push' || github.ref != 'refs/heads/main'
        run: sbt report

      - name: Test with aggregated coverage and upload to Coveralls
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
        run: sbt ci

  frontend:
    name: Frontend (React / TypeScript / Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web-ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc

      - name: Build
        run: npm run build