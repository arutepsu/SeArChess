name: searchess-demo

services:
  envoy:
    image: envoyproxy/envoy:v1.32-latest
    depends_on:
      game-service:
        condition: service_healthy
    ports:
      - "10000:10000"
    volumes:
      - ./config/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro

  game-service:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
      CORS_ENABLED: "true"
      CORS_ALLOWED_ORIGIN: http://localhost:5173
      WS_ENABLED: "true"
      WS_PORT: 9090
      SEARCHESS_POSTGRES_URL: jdbc:postgresql://postgres:5432/searchess
      SEARCHESS_POSTGRES_USER: searchess
      SEARCHESS_POSTGRES_PASSWORD: searchess
      SEARCHESS_MONGO_URI: mongodb://mongo:27017/searchess
      EVENT_MODE: in-process
      HISTORY_FORWARDING_ENABLED: "false"
      AI_PROVIDER_MODE: remote
      AI_REMOTE_BASE_URL: http://ai-service:8765
      AI_TIMEOUT_MILLIS: 2000
      AI_REMOTE_TEST_MODE: ${AI_REMOTE_TEST_MODE:-}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: searchess
      POSTGRES_USER: searchess
      POSTGRES_PASSWORD: searchess
    ports:
      - "5432:5432"
    volumes:
      - searchess_demo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U searchess -d searchess"]
      interval: 5s
      timeout: 3s
      retries: 12

  mongo:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - searchess_demo_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 3s
      retries: 12

  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.ai
    expose:
      - "8765"
    environment:
      AI_HTTP_HOST: 0.0.0.0
      AI_HTTP_PORT: 8765
      AI_ENGINE_ID: random-legal
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8765/health"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  searchess_demo_postgres_data:
  searchess_demo_mongo_data:
